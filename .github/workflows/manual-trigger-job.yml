name: Manually trigger an Azure Machine Learning job

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo
      uses: actions/checkout@main
    - name: Install az ml extension
      run: az extension add -n ml -y
    - name: Azure login
      uses: AZURE_CREDENTIALS
      with:
        creds: ${{secrets.AZURE_CREDENTIALS}}
- name: Run Azure Machine Learning training job run: az ml job create -f src/job.yml --stream --resource-group ${{vars.rg-ai300-l63500750}} --workspace-name ${{vars.mlw-ai300-l63500750}}
